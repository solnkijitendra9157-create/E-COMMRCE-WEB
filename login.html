<!DOCTYPE html>
 <html>
    <head>
     <title>
        LOGIN J-TECH
     </title>
    </head>
     <body style="background-color:rgb(0, 0, 0)">

      <h1 align="center" style="color:white">
        REGISTER IN J-TECH
       </h1>

       <table align="center" border="two" width="auto" height="auto" style="background-color:white">
         <form action="index.html" method="post">

            <tr>
             <td align="center">
            <h1>Email:</h1>
                  <input type="text" required placeholder="Enter Your Email:" name="email"><br>
             </td>
            </tr>

             
            <tr>
             <td align="center">
            <h1>Mobile Number:</h1>
                  <input type="text" required placeholder="Enter Your Phone Number:" name="mobile"><br>
             </td>
            </tr>

            <tr>
             <td align="center">
            <h1>Password:</h1>
                  <input type="password"required placeholder="Enter Your Password:" name="password"><br>
             </td>
            </tr>

            <tr>
             <td align="center">
            <h1>Confirm Password:</h1>
                 <input type="password"required placeholder="Confirm Your Password:" name="confirm_password"><br>
            </td>
           </tr>

            <tr>
             <td align="center">
              <pre><input type="submit" value="Register" style="background-color:lightgreen" onsubmit="return" href="index.html">             <input type="Reset" value="Reset" style="background-color:lightgoldenrodyellow"></pre> 
             </td>
            </tr>

         </form>
       </table>

     </body>
 </html>
